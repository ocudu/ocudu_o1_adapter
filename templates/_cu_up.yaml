cu_up:
{% if cuup_config.ngu is defined %}
  ngu:
    socket:
{% for s in cuup_config.ngu.socket %}      - bind_addr: {{ s.bind_addr }}
{% endfor %}
{% endif %}
{% if cuup_config.f1u is defined %}
  f1u:
{% if cuup_config.f1u.bind_port is defined %}    bind_port: {{ cuup_config.f1u.bind_port }}
{% endif %}{% if cuup_config.f1u.peer_port is defined %}    peer_port: {{ cuup_config.f1u.peer_port }}
{% endif %}    socket:
{% for s in cuup_config.f1u.socket %}      - bind_addr: {{ s.bind_addr }}
{% endfor %}
{% endif %}
{% if cuup_config.test_mode is defined %}
  test_mode:
{% for key, value in cuup_config.test_mode.items() %}    {{ key }}: {{ value }}
{% endfor %}
{% endif %}
