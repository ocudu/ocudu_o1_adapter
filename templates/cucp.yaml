cu_cp:
  amf:
    {% for key, value in cucp_config.amf.items() -%}
    {% if value is number or value is string -%}
    {{ key }}: {{ value }}
    {% else %}
    {{ key }}:
    {% for list_item in value %}
      - {% for key2, value2 in list_item.items() -%}
        {% if value2 is number or value2 is string -%}
        {{ key2 }}: {{ value2 }}
        {% else -%}
        {{ key2 }}:
        {% for list_item2 in value2 %}
          - {% for key3, value3 in list_item2.items() -%}
            {% if value3 is number or value3 is string -%}
            {{ key3 }}: {{ value3 }}
            {% else -%}
            {{ key3 }}:
            {% for list_item3 in value3 %}
              - {% for key4, value4 in list_item3.items() -%}
                {{ key4 }}: {{ value4 }}
                {% endfor -%}
            {% endfor -%}
            {% endif -%}
            {% endfor -%}
        {% endfor -%}
        {% endif -%}
        {% endfor -%}
    {% endfor %}
    {% endif -%}
    {% endfor %}
{% if cucp_config.e1ap is defined %}
  e1ap:
    bind_addrs: {{ cucp_config.e1ap.bind_addrs }}
{% endif %}
{% if cucp_config.f1ap is defined %}
  f1ap:
    bind_addrs: {{ cucp_config.f1ap.bind_addrs }}
{% endif %}
