{% if ru_sdr_config %}
ru_sdr:{% for key, value in ru_sdr_config.items() %}{% if value is mapping %}
  {{ key }}:{% for k2, v2 in value.items() %}
    {{ k2 }}: {{ v2 }}{% endfor %}{% else %}
  {{ key }}: {{ value }}{% endif %}{% endfor %}
{% elif ofh_cells %}
ru_ofh:
  cells:
  {% for dict_item in ofh_cells -%}
    -
    {% for key, value in dict_item.items() -%}
      {{key}}: {{ value }}
    {% endfor %}
  {% endfor %}
{% else %}
ru_dummy:{% for key, value in ru_dummy_config.items() %}
  {{ key }}: {{ value }}{% endfor %}
{% endif %}

{% if hal_config %}
hal:
{% if hal_config.get("bbdev_hwacc") %}
  bbdev_hwacc:{% for key, value in hal_config.bbdev_hwacc.items() if key not in ["pdsch_enc", "pusch_dec"] %}
    {{ key }}: {{ value }}{% endfor %}
    {% if hal_config.bbdev_hwacc.get("pdsch_enc") %}
    pdsch_enc:{% for sub_key, sub_value in hal_config.bbdev_hwacc.pdsch_enc.items() %}
      {{ sub_key }}: {{ sub_value }}{% endfor %}
    {% endif -%}
    {% if hal_config.bbdev_hwacc.get("pusch_dec") %}
    pusch_dec:{% for sub_key, sub_value in hal_config.bbdev_hwacc.pusch_dec.items() %}
      {{ sub_key }}: {{ sub_value }}{% endfor %}
    {% endif -%}
{% endif -%}
{% for key, value in hal_config.items() if key != "bbdev_hwacc" %}
  {{ key }}: {{ value }}
{% endfor %}
{% endif %}

cells:
{% for dict_item in du_cells -%}
-
  {% for key, value in dict_item.items() -%}
  {% if value is number or value is string -%}
  {{ key }}: {{ value }}
  {% else -%}
  {{ key }}:
  {% for key2, value2 in value.items() %}
    {{ key2 }}: {{ value2 }}
  {% endfor -%}
  {% endif -%}
  {% endfor %}
{% endfor -%}

cell_cfg:
  {% for key, value in cell_config.items() -%}
  {% if value is number or value is string -%}
  {{ key }}: {{ value }}
  {% else %}
  {{ key }}:
  {% for list_item in value -%}
  -
    {% for key2, value2 in list_item.items() -%}
    {% if value2 is number or value2 is string -%}
    {{ key2 }}: {{ value2 }}
    {% else -%}
    {{ key2 }}:
    {% for key3, value3 in value2.items() %}
      {{ key3 }}: {{ value3 }}
    {% endfor -%}
    {% endif -%}
  {% endfor -%}
  {% endfor %}
  {% endif -%}
  {% endfor %}

{% if testmode_config["enabled"] == "true" -%}
test_mode:
  test_ue:{% for key, value in testmode_config.items() if "enabled" not in key %}
    {{ key }}: {{ value }}{% endfor %}
{% endif %}
{% if f1ap_config -%}
f1ap:
  addrs: {{ f1ap_config.addrs }}
  bind_addrs: {{ f1ap_config.bind_addrs }}
{% endif %}
{% if f1u_config -%}
f1u:
{% if f1u_config.bind_port is defined %}  bind_port: {{ f1u_config.bind_port }}
{% endif %}{% if f1u_config.peer_port is defined %}  peer_port: {{ f1u_config.peer_port }}
{% endif %}  socket:
{% for s in f1u_config.socket %}    - bind_addr: {{ s.bind_addr }}
{% endfor %}
{% endif %}
{% include "_trailer.yaml" %}
